# ============================================
# Docker Compose - Production
# DisherIo Restaurant Management System
# ============================================

version: '3.8'

services:
  # -----------------------------------------
  # MongoDB Database
  # -----------------------------------------
  mongo:
    image: mongo:7
    container_name: disherio_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - disherio_net
    environment:
      MONGO_INITDB_DATABASE: disherio
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # -----------------------------------------
  # Backend API (Node.js + Express)
  # -----------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: disherio_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - disherio_net
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/disherio
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES: 8h
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    expose:
      - "3000"
    volumes:
      - disherio_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # -----------------------------------------
  # Frontend (Angular + Caddy)
  # -----------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: disherio_frontend
    restart: unless-stopped
    networks:
      - disherio_net
    expose:
      - "4200"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4200 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # -----------------------------------------
  # Caddy Reverse Proxy
  # -----------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: disherio_caddy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${PORT:-80}:${PORT:-80}"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - disherio_uploads:/srv/uploads:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - disherio_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  disherio_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mongo_data:
  disherio_uploads:
  caddy_data:
  caddy_config:
