# ============================================
# Docker Compose - Production
# DisherIo Restaurant Management System
# ============================================

services:
  # -----------------------------------------
  # MongoDB Database
  # -----------------------------------------
  mongo:
    image: mongo:7@sha256:340c1c56fb10e95cf79ff547f8664b96bc6ead9909bc355238cbf865a9695a6f
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip", "127.0.0.1,mongo", "--keyFile", "/data/db/mongo-keyfile"]
    volumes:
      - mongo_data:/data/db
      - ./backend/scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
      # Mount keyFile for replica set internal authentication (required with --auth + replSet)
      - ./config/mongo-keyfile:/data/db/mongo-keyfile:ro
    networks:
      - backend_net
    environment:
      MONGO_INITDB_DATABASE: disherio
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/mongo_root_password
      MONGO_APP_USER: ${MONGO_APP_USER:-disherio_app}
      MONGO_APP_PASSWORD_FILE: /run/secrets/mongo_app_password
    secrets:
      - mongo_root_password
      - mongo_app_password
    healthcheck:
      # Read the password from the secret file inside mongosh (db.auth) so
      # credentials never appear in the process argument list.
      test: ["CMD-SHELL", "mongosh --quiet --eval \"const pw = require('fs').readFileSync('/run/secrets/mongo_root_password','utf8').trim(); db.getSiblingDB('admin').auth(process.env.MONGO_INITDB_ROOT_USERNAME, pw); quit(0)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    # Resource limits - Production (más restrictivos)
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # One-shot service to initiate the MongoDB replica set (required for transactions)
  mongo-init-replica:
    image: mongo:7@sha256:340c1c56fb10e95cf79ff547f8664b96bc6ead9909bc355238cbf865a9695a6f
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - backend_net
    environment:
      MONGO_ROOT_USER: ${MONGO_ROOT_USER:-admin}
      MONGO_ROOT_PASSWORD_FILE: /run/secrets/mongo_root_password
    secrets:
      - mongo_root_password
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "[init-replica] Waiting for MongoDB to accept connections..."
        attempts=0
        until mongosh --quiet --host mongo --eval "
          const pw = require('fs').readFileSync('/run/secrets/mongo_root_password','utf8').trim();
          db.getSiblingDB('admin').auth(process.env.MONGO_ROOT_USER, pw);
          print(db.adminCommand('ping').ok);
        " >/dev/null 2>&1; do
          attempts=$$((attempts + 1))
          [ "$$attempts" -lt 60 ] || { echo "[init-replica] Timed out waiting for MongoDB" >&2; exit 1; }
          sleep 2
        done
        echo "[init-replica] Initiating replica set rs0..."
        mongosh --quiet --host mongo --eval "
          const pw = require('fs').readFileSync('/run/secrets/mongo_root_password','utf8').trim();
          db.getSiblingDB('admin').auth(process.env.MONGO_ROOT_USER, pw);
          try {
            const s = rs.status();
            print('[init-replica] Replica set already initialized (state=' + s.myState + ')');
          } catch (e) {
            rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] });
            print('[init-replica] Replica set initiated.');
          }
        "
        echo "[init-replica] Waiting for primary..."
        attempts=0
        until mongosh --quiet --host mongo --eval "
          const pw = require('fs').readFileSync('/run/secrets/mongo_root_password','utf8').trim();
          db.getSiblingDB('admin').auth(process.env.MONGO_ROOT_USER, pw);
          print(db.hello().isWritablePrimary);
        " >/dev/null 2>&1; do
          attempts=$$((attempts + 1))
          [ "$$attempts" -lt 60 ] || { echo "[init-replica] Timed out waiting for primary" >&2; exit 1; }
          sleep 2
        done
        echo "[init-replica] Primary ready. Done."
    restart: "no"

  # -----------------------------------------
  # Redis Cache / PubSub
  # -----------------------------------------
  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - |
        printf 'bind 127.0.0.1\nappendonly yes\nappendfsync everysec\nrequirepass %s\n' "$$(cat /run/secrets/redis_password)" > /tmp/redis.conf
        exec redis-server /tmp/redis.conf
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    secrets:
      - redis_password
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$(cat /run/secrets/redis_password) redis-cli ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # -----------------------------------------
  # Backend API (Node.js + Express)
  # -----------------------------------------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      mongo-init-replica:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - frontend_net
      - backend_net
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI_FILE: /run/secrets/mongodb_uri
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      JWT_EXPIRES: ${JWT_EXPIRES:-15m}
      JWT_REFRESH_SECRET_FILE: /run/secrets/jwt_refresh_secret
      PIN_LOOKUP_PEPPER_FILE: /run/secrets/pin_lookup_pepper
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      MONGODB_MAX_POOL_SIZE: ${MONGODB_MAX_POOL_SIZE:-50}
      MONGODB_SERVER_SELECTION_TIMEOUT: ${MONGODB_SERVER_SELECTION_TIMEOUT:-30000}
      MONGODB_SOCKET_TIMEOUT: ${MONGODB_SOCKET_TIMEOUT:-45000}
      TRUST_PROXY: ${TRUST_PROXY:-true}
    expose:
      - "3000"
    volumes:
      - disherio_uploads:/app/uploads
    secrets:
      - mongodb_uri
      - jwt_secret
      - jwt_refresh_secret
      - pin_lookup_pepper
      - redis_password
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Resource limits - Production (más restrictivos)
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # -----------------------------------------
  # Frontend (Angular + Caddy)
  # -----------------------------------------
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    networks:
      - frontend_net
    expose:
      - "4200"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Resource limits - Production (más restrictivos)
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 384M
        reservations:
          cpus: '0.2'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # -----------------------------------------
  # Caddy Reverse Proxy con HTTPS
  # -----------------------------------------
  caddy:
    image: caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - disherio_uploads:/srv/uploads:ro
      # Volumenes persistentes para certificados TLS
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - frontend_net
    user: "65532:65532"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    # Resource limits - Production (más restrictivos)
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 192M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/health/ready || wget --no-check-certificate -qO- https://127.0.0.1:443/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

networks:
  frontend_net:
    name: disherio_frontend_net
    driver: bridge
  backend_net:
    name: disherio_backend_net
    driver: bridge
    internal: true

volumes:
  mongo_data:
    name: disherio_mongo_data
  redis_data:
    name: disherio_redis_data
  disherio_uploads:
    name: disherio_uploads
  # Volumen para certificados TLS y datos de Caddy
  caddy_data:
    name: disherio_caddy_data
  caddy_config:
    name: disherio_caddy_config

secrets:
  mongo_root_password:
    file: ./config/secrets/mongo_root_password
  mongo_app_password:
    file: ./config/secrets/mongo_app_password
  mongodb_uri:
    file: ./config/secrets/mongodb_uri
  redis_password:
    file: ./config/secrets/redis_password
  jwt_secret:
    file: ./config/secrets/jwt_secret
  jwt_refresh_secret:
    file: ./config/secrets/jwt_refresh_secret
  pin_lookup_pepper:
    file: ./config/secrets/pin_lookup_pepper
