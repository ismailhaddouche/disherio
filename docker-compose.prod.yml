# ============================================
# Docker Compose - Production
# DisherIo Restaurant Management System
# ============================================

version: '3.8'

services:
  # -----------------------------------------
  # MongoDB Database
  # -----------------------------------------
  mongo:
    image: mongo:7
    container_name: disherio_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - disherio_net
    environment:
      MONGO_INITDB_DATABASE: disherio
    healthcheck:
      test: ["CMD-SHELL", "echo 'db.runCommand({ping:1}).ok' | mongosh -u $${MONGO_INITDB_ROOT_USERNAME} -p $${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin --quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    # Resource limits - Production (más restrictivos)
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # -----------------------------------------
  # Backend API (Node.js + Express)
  # -----------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: disherio_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - disherio_net
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/disherio
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES: 8h
      FRONTEND_URL: ${FRONTEND_URL:-https://localhost}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    expose:
      - "3000"
    volumes:
      - disherio_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health/simple"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Resource limits - Production (más restrictivos)
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # -----------------------------------------
  # Frontend (Angular + Caddy)
  # -----------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: disherio_frontend
    restart: unless-stopped
    networks:
      - disherio_net
    expose:
      - "4200"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Resource limits - Production (más restrictivos)
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 384M
        reservations:
          cpus: '0.2'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # -----------------------------------------
  # Caddy Reverse Proxy con HTTPS
  # -----------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: disherio_caddy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - disherio_uploads:/srv/uploads:ro
      # Volumenes persistentes para certificados TLS
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - disherio_net
    # Resource limits - Production (más restrictivos)
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 192M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  disherio_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mongo_data:
  disherio_uploads:
  # Volumen para certificados TLS y datos de Caddy
  caddy_data:
  caddy_config:
