<div class="mesh-background"></div>

<!-- App Layout -->
<div class="app-layout" [class.with-sidebar]="auth.isAuthenticated()">

  <app-notification></app-notification>

  <!-- Sidebar (Only for authenticated staff) -->
  <app-sidebar *ngIf="auth.isAuthenticated()" [isCollapsed]="sidebarCollapsed()"
    (collapsedChange)="sidebarCollapsed.set($event)">
  </app-sidebar>

  <!-- Mobile Overlay -->
  <div class="sidebar-overlay" *ngIf="auth.isAuthenticated() && sidebarCollapsed()"
    (click)="sidebarCollapsed.set(false)"></div>

  <!-- Main Content Area -->
  <main class="main-content">

    <!-- Top Bar (Contextual Info) -->
    <header class="top-bar-md3" *ngIf="auth.isAuthenticated()">
      <div class="top-bar-start">
        <button class="icon-btn-md3 mobile-only" (click)="sidebarCollapsed.set(!sidebarCollapsed())">
          <lucide-icon name="menu" [size]="24"></lucide-icon>
        </button>
        <span class="restaurant-name-md3 text-title-large">{{ 'APP.RESTAURANT_NAME' | translate }}</span>
      </div>

      <div class="top-bar-end">
        <div class="status-chip-md3" [class]="comms.connectionStatus()">
          <span class="status-dot-md3" [class.online]="comms.isOnline()"></span>
          <span class="text-label-medium">{{ comms.isOnline() ? ('APP.ONLINE' | translate) : ('APP.OFFLINE' | translate)
            }}</span>
        </div>

        <div class="user-profile-md3 md-card-elevated">
          <div class="avatar-circle">
            <lucide-icon name="user" [size]="16"></lucide-icon>
          </div>
          <span class="text-label-large">{{ auth.currentUser()?.username }}</span>
        </div>
      </div>
    </header>

    <!-- Router Content -->
    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>

  </main>
</div>

<style>
  :root {
    --sidebar-width: 280px;
    --sidebar-collapsed-width: 88px;
  }

  .app-layout {
    display: flex;
    min-height: 100vh;
    background: var(--md-sys-color-surface-container-low);
    overflow: hidden;
    width: 100vw;
  }

  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    position: relative;
    height: 100vh;
    overflow: hidden;
    background: var(--md-sys-color-surface);
  }

  .top-bar-md3 {
    height: 64px;
    margin: 16px 24px 0 24px;
    padding: 0 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--md-sys-color-surface-2);
    border-radius: 20px;
    z-index: 50;
    box-shadow: var(--md-sys-elevation-1);
    flex-shrink: 0;
  }

  .top-bar-start,
  .top-bar-end {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .restaurant-name-md3 {
    color: var(--md-sys-color-primary);
    font-weight: 700;
  }

  .status-chip-md3 {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 14px;
    background: var(--md-sys-color-surface-container-high);
    border-radius: 20px;
    color: var(--md-sys-color-on-surface-variant);
  }

  .status-chip-md3.connected {
    background: var(--md-sys-color-primary-container);
    color: var(--md-sys-color-on-primary-container);
  }

  .status-dot-md3 {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--md-sys-color-error);
  }

  .status-dot-md3.online {
    background: #34d399;
    /* Success green from MD3 if available, or just keeping it bright */
    box-shadow: 0 0 8px color-mix(in srgb, #34d399 40%, transparent);
  }

  .user-profile-md3 {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 4px 16px 4px 6px;
    border-radius: 100px;
    background: var(--md-sys-color-surface-3);
    cursor: pointer;
    transition: background 0.2s;
  }

  .user-profile-md3:hover {
    background: var(--md-sys-color-surface-4);
  }

  .avatar-circle {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--md-sys-color-primary);
    color: var(--md-sys-color-on-primary);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .content-wrapper {
    flex: 1;
    padding: 24px;
    overflow-y: auto;
    position: relative;
  }

  .sidebar-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(8px);
    z-index: 90;
    animation: fadeIn 0.2s ease-out;
  }

  .icon-btn-md3 {
    background: transparent;
    border: none;
    color: var(--md-sys-color-on-surface);
    cursor: pointer;
    padding: 8px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .icon-btn-md3:hover {
    background: var(--md-sys-color-surface-variant);
  }

  .mobile-only {
    display: none;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
    }

    to {
      opacity: 1;
    }
  }

  .md3-placeholder-spinner {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--md-sys-color-surface);
    z-index: 10;
  }

  .spinner-dot {
    width: 48px;
    height: 48px;
    border: 4px solid var(--md-sys-color-surface-variant);
    border-top-color: var(--md-sys-color-primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .md3-loading-shim {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: var(--md-sys-color-surface-variant);
    overflow: hidden;
  }

  .md3-loading-shim::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 40%;
    height: 100%;
    background: var(--md-sys-color-primary);
    animation: shim 1.5s infinite ease-in-out;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  @keyframes shim {
    0% {
      left: -40%;
    }

    100% {
      left: 100%;
    }
  }

  /* Responsive Adjustments */
  @media (max-width: 768px) {
    .mobile-only {
      display: flex;
    }

    .top-bar-md3 {
      margin: 12px 12px 0 12px;
      padding: 0 12px;
      border-radius: 12px;
    }

    .restaurant-name-md3 {
      display: none;
    }

    .content-wrapper {
      padding: 16px;
    }

    .top-bar-end {
      gap: 8px;
    }

    .status-chip-md3 span:not(.status-dot-md3) {
      display: none;
    }
  }
</style>
