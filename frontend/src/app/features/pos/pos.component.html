<div class="app-workspace flex text-on-surface">

  <!-- LEFT PANEL: Sessions & Totems -->
  <app-pos-sessions-sidebar
    [isConnected]="isConnected()"
    [isLoading]="isLoading()"
    [activeSessions]="activeSessions()"
    [closedSessions]="closedSessions()"
    [selectedSessionId]="selectedSession()?._id"
    [sessionItems]="sessionItems()"
    [availableTotems]="availableTotems()"
    [hasOpenSession]="hasOpenSession()"
    [showTicketHistory]="showTicketHistory()"
    [actions]="sessionActions"
    (sessionSelect)="selectSession($event)"
    (openHistory)="openTicketHistory()"
  />

  <!-- CENTER PANEL: Session items -->
  <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
    @if (showTicketHistory()) {
      <app-pos-ticket-history-panel />
    } @else if (selectedSession(); as session) {
      <app-pos-session-panel
        [session]="session"
        [state]="workspace"
        [customers]="customers()"
        [(showAddCustomer)]="showAddCustomer"
        [(newCustomerName)]="newCustomerName"
        (addCustomer)="addCustomer()"
        (assignSelect)="assignItemFromSelect($event.itemId, $event.event)"
        (addOrder)="showMenu.set(true)"
      />
    } @else {
      <!-- No Session Selected -->
      <div class="flex-1 flex flex-col items-center justify-center text-on-surface-variant">
        <span class="material-symbols-outlined text-6xl mb-4">table_restaurant</span>
        <p class="text-lg">{{ 'pos.select_table' | translate }}</p>
      </div>
    }
  </main>

  <!-- RIGHT PANEL: Menu (when adding items) or Ticket -->
  @if (!showTicketHistory()) {
    @if (showMenu()) {
      <app-pos-menu-panel
        [state]="workspace"
        [categories]="categories()"
        (closed)="showMenu.set(false)"
      />
    } @else {
      <app-pos-ticket-panel
        [state]="workspace"
        [session]="selectedSession()"
        [sessionItems]="sessionItems()"
        [sessionTotal]="sessionTotal()"
        [isSessionClosed]="isSessionClosed()"
        [isSendingOrder]="isSendingOrder()"
        [actions]="sessionActions"
        (sendOrder)="sendOrder()"
        (charge)="openPaymentModal()"
      />
    }
  }

  <!-- Dish Detail Modal (for variants/extras) -->
  @if (selectedDish(); as dish) {
    <app-pos-dish-modal
      [state]="workspace"
      [dish]="dish"
      [customers]="customers()"
    />
  }

  <!-- Payment Modal -->
  @if (showPaymentModal()) {
    <app-pos-payment-modal
      [state]="workspace"
      [total]="sessionTotal()"
      (process)="processPayment()"
    />
  }
</div>
