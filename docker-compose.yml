services:
  mongo:
    image: mongo:7@sha256:340c1c56fb10e95cf79ff547f8664b96bc6ead9909bc355238cbf865a9695a6f
    restart: unless-stopped
    user: "999:999"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    command: ["--replSet", "rs0", "--bind_ip", "127.0.0.1,mongo", "--keyFile", "/data/db/mongo-keyfile"]
    volumes:
      - mongo_data:/data/db
      # Mount initialization script for creating app user and indexes
      - ./backend/scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
      # Mount keyFile for replica set authentication (required with --auth + replSet)
      - ./config/mongo-keyfile:/data/db/mongo-keyfile:ro
    networks:
      - backend_net
    environment:
      MONGO_INITDB_DATABASE: disherio
      # Root credentials for MongoDB admin user
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/mongo_root_password
      # Application user credentials (used by init script)
      MONGO_APP_USER: ${MONGO_APP_USER:-disherio_app}
      MONGO_APP_PASSWORD_FILE: /run/secrets/mongo_app_password
    secrets:
      - mongo_root_password
      - mongo_app_password
    # Resource limits for MongoDB
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      # Read the password from the secret file inside mongosh (db.auth) so
      # credentials never appear in the process argument list.
      test: ["CMD-SHELL", "mongosh --quiet --eval \"const pw = require('fs').readFileSync('/run/secrets/mongo_root_password','utf8').trim(); db.getSiblingDB('admin').auth(process.env.MONGO_INITDB_ROOT_USERNAME, pw); quit(0)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # One-shot service to initiate the MongoDB replica set (required for transactions)
  mongo-init-replica:
    image: mongo:7@sha256:340c1c56fb10e95cf79ff547f8664b96bc6ead9909bc355238cbf865a9695a6f
    user: "999:999"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - backend_net
    environment:
      MONGO_ROOT_USER: ${MONGO_ROOT_USER:-admin}
      MONGO_ROOT_PASSWORD_FILE: /run/secrets/mongo_root_password
    secrets:
      - mongo_root_password
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "[init-replica] Waiting for MongoDB to accept connections..."
        attempts=0
        until mongosh --quiet --host mongo --eval "
          const pw = require('fs').readFileSync('/run/secrets/mongo_root_password','utf8').trim();
          db.getSiblingDB('admin').auth(process.env.MONGO_ROOT_USER, pw);
          print(db.adminCommand('ping').ok);
        " >/dev/null 2>&1; do
          attempts=$$((attempts + 1))
          [ "$$attempts" -lt 60 ] || { echo "[init-replica] Timed out waiting for MongoDB" >&2; exit 1; }
          sleep 2
        done
        echo "[init-replica] Initiating replica set rs0..."
        mongosh --quiet --host mongo --eval "
          const pw = require('fs').readFileSync('/run/secrets/mongo_root_password','utf8').trim();
          db.getSiblingDB('admin').auth(process.env.MONGO_ROOT_USER, pw);
          try {
            const s = rs.status();
            print('[init-replica] Replica set already initialized (state=' + s.myState + ')');
          } catch (e) {
            rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] });
            print('[init-replica] Replica set initiated.');
          }
        "
        echo "[init-replica] Waiting for primary..."
        attempts=0
        until mongosh --quiet --host mongo --eval "
          const pw = require('fs').readFileSync('/run/secrets/mongo_root_password','utf8').trim();
          db.getSiblingDB('admin').auth(process.env.MONGO_ROOT_USER, pw);
          print(db.hello().isWritablePrimary);
        " >/dev/null 2>&1; do
          attempts=$$((attempts + 1))
          [ "$$attempts" -lt 60 ] || { echo "[init-replica] Timed out waiting for primary" >&2; exit 1; }
          sleep 2
        done
        echo "[init-replica] Primary ready. Done."
    restart: "no"

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    # The redis:7-alpine entrypoint only drops privileges to the redis user
    # (UID 999) when the command starts with redis-server. Our command uses a
    # /bin/sh -c wrapper to build redis.conf from the secret, so without an
    # explicit user the process runs as root; with cap_drop ALL root cannot
    # write to the redis-owned /data volume, and AOF fails with
    # "append-only dir appendonlydir: Permission denied". Pin UID 999 so the
    # process matches the volume ownership (same UID mongo uses).
    user: "999:999"
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    command:
      - /bin/sh
      - -c
      - |
        # Listen on all container interfaces (loopback + backend_net): the backend
        # connects from another container via redis://redis:6379. Safe because
        # backend_net is internal:true and requirepass is set.
        printf 'bind 0.0.0.0\nappendonly yes\nappendfsync everysec\nrequirepass %s\n' "$$(cat /run/secrets/redis_password)" > /tmp/redis.conf
        exec redis-server /tmp/redis.conf
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    secrets:
      - redis_password
    # Resource limits for Redis
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      # Use REDISCLI_AUTH instead of -a so the password is not visible in the
      # process argument list (docker inspect / ps).
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$(cat /run/secrets/redis_password) redis-cli ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    hostname: backend
    user: "1001:1001"
    networks:
      frontend_net:
        aliases:
          - backend
      backend_net: {}
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      mongo:
        condition: service_healthy
      mongo-init-replica:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      # Connection string with authentication
      # Uses app user (readWrite role) for security
      MONGODB_URI_FILE: /run/secrets/mongodb_uri
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      JWT_EXPIRES: ${JWT_EXPIRES:-15m}
      JWT_REFRESH_SECRET_FILE: /run/secrets/jwt_refresh_secret
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      FRONTEND_URL: ${FRONTEND_URL}
      # Redis connection
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      # MongoDB connection pool settings
      MONGODB_MAX_POOL_SIZE: ${MONGODB_MAX_POOL_SIZE:-50}
      MONGODB_SERVER_SELECTION_TIMEOUT: ${MONGODB_SERVER_SELECTION_TIMEOUT:-30000}
      MONGODB_SOCKET_TIMEOUT: ${MONGODB_SOCKET_TIMEOUT:-45000}
      # Trust proxy (Caddy reverse proxy)
      TRUST_PROXY: ${TRUST_PROXY:-true}
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
    expose:
      - "3000"
    volumes:
      - disherio_uploads:/app/uploads
    secrets:
      - mongodb_uri
      - jwt_secret
      - jwt_refresh_secret
      - redis_password
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    hostname: frontend
    networks:
      frontend_net:
        aliases:
          - frontend
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /data
      - /config
    expose:
      - "4200"
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4200 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # One-shot seed service: creates default restaurant, roles and admin user
  seed:
    profiles: ["seed"]
    # Use the published GHCR image in production; fall back to local build
    # when the image is not available (e.g. development or offline install).
    image: ${SEED_IMAGE:-ghcr.io/ismailhaddouche/disherio-seed:latest}
    build:
      context: .
      dockerfile: backend/Dockerfile.seed
    depends_on:
      mongo:
        condition: service_healthy
      mongo-init-replica:
        condition: service_completed_successfully
    networks:
      - backend_net
    environment:
      NODE_ENV: production
      MONGODB_URI_FILE: /run/secrets/mongodb_uri
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD_FILE: /run/secrets/admin_password
      DEFAULT_LANGUAGE: ${DEFAULT_LANGUAGE:-es}
      RESTAURANT_NAME: ${RESTAURANT_NAME:-DisherIo}
      DEFAULT_CURRENCY: ${DEFAULT_CURRENCY:-EUR}
      DEFAULT_TAX_RATE: ${DEFAULT_TAX_RATE:-10}
      DEFAULT_THEME: ${DEFAULT_THEME:-light}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      JWT_REFRESH_SECRET_FILE: /run/secrets/jwt_refresh_secret
    secrets:
      - mongodb_uri
      - admin_password
      - jwt_secret
      - jwt_refresh_secret
    command: ["node", "dist/seeders/index.js"]
    restart: "no"

  # One-shot example seed: creates menu/table examples. Fixed-credential staff
  # users are created only when this seeder runs outside production.
  seed-examples:
    profiles: ["seed"]
    # Uses the same image as seed (the command differs); overridden below.
    image: ${SEED_EXAMPLES_IMAGE:-ghcr.io/ismailhaddouche/disherio-seed:latest}
    build:
      context: .
      dockerfile: backend/Dockerfile.seed
    depends_on:
      seed:
        condition: service_completed_successfully
    networks:
      - backend_net
    environment:
      NODE_ENV: production
      # Required by the production guard in seed-examples; the installer sets
      # it to "true" only after the user opts in to demo data.
      SEED_EXAMPLES_CONFIRM: ${SEED_EXAMPLES_CONFIRM:-false}
      MONGODB_URI_FILE: /run/secrets/mongodb_uri
      RESTAURANT_NAME: ${RESTAURANT_NAME:-DisherIo}
      DEFAULT_LANGUAGE: ${DEFAULT_LANGUAGE:-es}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      JWT_REFRESH_SECRET_FILE: /run/secrets/jwt_refresh_secret
    secrets:
      - mongodb_uri
      - jwt_secret
      - jwt_refresh_secret
    command: ["node", "dist/seeders/seed-examples.js"]
    restart: "no"

  # One-shot service: fixes ownership of Caddy's named volumes. The
  # caddy:2-alpine image initializes /data and /config as root:root, but the
  # caddy service runs as uid 65532 and must write ACME certificates and
  # autosaved config there. Runs as root with only the capabilities needed
  # to chown; idempotent, safe on first boot and on pre-existing volumes.
  caddy-init:
    image: caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    user: "0:0"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    read_only: true
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    entrypoint: ["/bin/sh", "-c"]
    command:
      - chown -R 65532:65532 /data /config
    restart: "no"

  caddy:
    image: caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      caddy-init:
        condition: service_completed_successfully
    ports:
      # Same value on both sides: the Caddy templates listen on ${HTTP_PORT}/
      # ${HTTPS_PORT} *inside* the container, so the published host port must
      # equal the container port. (The previous host:80/443 fixed container
      # mapping broke local-ip mode whenever HTTP_PORT/HTTPS_PORT changed.)
      - "${HTTP_PORT:-80}:${HTTP_PORT:-80}"
      - "${HTTPS_PORT:-443}:${HTTPS_PORT:-443}"
    expose:
      - "8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - disherio_uploads:/srv/uploads:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - frontend_net
    user: "65532:65532"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080 || wget -qO- http://127.0.0.1:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

networks:
  frontend_net:
    name: disherio_frontend_net
    driver: bridge
  backend_net:
    name: disherio_backend_net
    driver: bridge
    internal: true

volumes:
  mongo_data:
    name: disherio_mongo_data
  redis_data:
    name: disherio_redis_data
  disherio_uploads:
    name: disherio_uploads
  caddy_data:
    name: disherio_caddy_data
  caddy_config:
    name: disherio_caddy_config

secrets:
  mongo_root_password:
    file: ./config/secrets/mongo_root_password
  mongo_app_password:
    file: ./config/secrets/mongo_app_password
  mongodb_uri:
    file: ./config/secrets/mongodb_uri
  redis_password:
    file: ./config/secrets/redis_password
  jwt_secret:
    file: ./config/secrets/jwt_secret
  jwt_refresh_secret:
    file: ./config/secrets/jwt_refresh_secret
  admin_password:
    file: ./config/secrets/admin_password
