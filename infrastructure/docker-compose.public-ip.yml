# ============================================
# Docker Compose Override - Modo PUBLIC-IP
# ============================================
# IP pública con túnel (Cloudflare/ngrok)
# ============================================

services:
  # Caddy escucha solo en puerto interno (sin exposición externa)
  caddy:
    ports: !reset []
    expose:
      - "${CADDY_INTERNAL_PORT:-8080}"
    command: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    networks:
      # frontend_net (definida en docker-compose.yml): alcanzar backend/frontend
      - frontend_net
      - tunnel_net

  # Backend configurado para túnel
  # No se sobrescribe `networks`: hereda frontend_net/backend_net del compose
  # base para seguir alcanzando mongo/redis y al proxy.
  backend:
    environment:
      - NODE_ENV=production
      - FRONTEND_URL=${TUNNEL_URL:-https://localhost}
      - TRUST_PROXY=true

  # Cloudflare Tunnel (opcional, si se seleccionó)
  cloudflared:
    image: cloudflare/cloudflared@sha256:4f6655284ab3d252b7f28fedb19fe6c8fc82ee5b1295c20ac74d475e5398a52d
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token-file /run/secrets/cloudflare_tunnel_token
    environment:
      - TUNNEL_TOKEN_FILE=/run/secrets/cloudflare_tunnel_token
    secrets:
      - cloudflare_tunnel_token
    networks:
      - tunnel_net
    depends_on:
      caddy:
        condition: service_healthy
    profiles:
      - cloudflare  # Solo se inicia si se especifica el perfil

  # ngrok (opcional, si se seleccionó)
  ngrok:
    image: ngrok/ngrok@sha256:14d80d083e5b53145f416bbbd36238336c9de4016c43fd950eb2eb845670583b
    restart: unless-stopped
    command: http --config /run/secrets/ngrok_config --url=${NGROK_DOMAIN:-} caddy:${CADDY_INTERNAL_PORT:-8080}
    secrets:
      - ngrok_config
    networks:
      - tunnel_net
    depends_on:
      caddy:
        condition: service_healthy
    profiles:
      - ngrok  # Solo se inicia si se especifica el perfil

# Red adicional para el túnel
networks:
  tunnel_net:
    driver: bridge
    # NOTA: no usar internal:true — cloudflared/ngrok necesitan acceso a Internet
    # para establecer el túnel saliente hacia Cloudflare/ngrok servers.

secrets:
  cloudflare_tunnel_token:
    file: ./config/secrets/cloudflare_tunnel_token
  ngrok_config:
    file: ./config/secrets/ngrok_config
