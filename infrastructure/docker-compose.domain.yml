# ============================================
# Docker Compose Override - Modo DOMAIN
# ============================================
# Dominio propio con Let's Encrypt
# ============================================

services:
  # Caddy con HTTPS automático (Let's Encrypt)
  caddy:
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp"  # HTTP/3 QUIC
    command: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - CADDY_ACME_CA=https://acme-v02.api.letsencrypt.org/directory

  # Backend configurado para dominio
  backend:
    environment:
      - NODE_ENV=production
      - FRONTEND_URL=https://${DOMAIN}
      - TRUST_PROXY=true

volumes:
  caddy_data:
    name: disherio_caddy_data
  caddy_config:
    name: disherio_caddy_config
